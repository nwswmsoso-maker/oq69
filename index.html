<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>بث غير جوك TV</title>
    <meta name="description" content="لمشاهده بث غير جوك TV">

    <meta property="og:title" content="بث غير جوك TV">
    <meta property="og:description" content="لمشاهده بث غير جوك TV">
    <meta property="og:image" content="icon.jpg">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kar12.vercel.app/">
    
    <link rel="icon" type="image/jpeg" href="icon.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* تأثير الزجاج الاحترافي للبطاقة */
        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 92%;
            position: relative;
            z-index: 10;
        }

        /* علامة مباشر الآن */
        .live-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* النقطة الحمراء النابضة */
        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #ff3838;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(255, 56, 56, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 56, 56, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 56, 56, 0); }
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        p.desc {
            color: #d1d1e0;
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* زر المشاهدة الاحترافي */
        .btn-stream {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(45deg, #ff3b3b, #ff0055);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 35px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(255, 59, 59, 0.5);
            animation: pulse-btn 2.5s infinite;
        }

        .btn-stream:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 30px rgba(255, 59, 59, 0.7);
            background: linear-gradient(45deg, #ff0055, #ff3b3b);
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* أيقونة التشغيل SVG */
        .play-icon {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #a0a0b5;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        
        <div class="live-badge">
            <span class="live-dot"></span> مباشر الآن
        </div>

        <h1>بث غير جوك TV</h1>
        
        <p class="desc">لمشاهده بث غير جوك TV</p>
        
        <a href="https://kar12.vercel.app/" target="_blank" class="btn-stream">
            <svg class="play-icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
            لمشاهده البث اضغط هنا
        </a>

        <div class="footer-note">
            متوافق مع جميع الأجهزة والهواتف 📱💻
        </div>

    </div>

</body>
</html>
